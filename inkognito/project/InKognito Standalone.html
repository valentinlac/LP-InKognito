document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nt:space-between;padding:0 5vw;transition:background .4s,border-color .4s,backdrop-filter .4s;border-bottom:1px solid transparent}\nnav.scrolled{background:rgba(7,12,23,.88);border-color:var(--border);backdrop-filter:blur(22px)}\n.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}\n.nav-logo-mark{width:32px;height:32px}\n.nav-logo-name{font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:700;letter-spacing:-.5px;color:var(--text)}\n.nav-logo-name span{color:#1a8fff}\n.nav-links{display:flex;gap:32px;list-style:none}\n.nav-links a{color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;transition:color .2s}\n.nav-links a:hover{color:var(--text)}\n.nav-right{display:flex;gap:10px;align-items:center}\n.btn-ghost{padding:8px 18px;border:1px solid var(--border);border-radius:8px;color:var(--text);text-decoration:none;font-size:13.5px;font-weight:500;font-family:'Space Grotesk',sans-serif;transition:border-color .2s,background .2s;background:transparent}\n.btn-ghost:hover{border-color:rgba(10,102,194,.5);background:rgba(10,102,194,.08)}\n.btn-cta{padding:9px 22px;background:linear-gradient(135deg,var(--blue),var(--blue2));border:none;border-radius:8px;color:#fff;text-decoration:none;font-size:13.5px;font-weight:600;font-family:'Space Grotesk',sans-serif;transition:box-shadow .25s,transform .2s;box-shadow:0 0 0 rgba(10,102,194,0)}\n.btn-cta:hover{box-shadow:0 0 28px rgba(10,102,194,.55);transform:translateY(-1px)}\n\n/* ─── HERO ─── */\n#hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:130px 5vw 0}\n.hero-grid{position:absolute;inset:0;background-image:radial-gradient(rgba(26,143,255,.07) 1px,transparent 1px);background-size:40px 40px;mask-image:radial-gradient(ellipse 70% 60% at 50% 30%,black 0%,transparent 100%)}\n.orb{position:absolute;border-radius:50%;filter:blur(100px);pointer-events:none}\n.o1{width:500px;height:500px;background:radial-gradient(circle,rgba(10,102,194,.22),transparent 70%);top:-120px;left:calc(50% - 360px);animation:orbf 14s ease-in-out infinite}\n.o2{width:400px;height:400px;background:radial-gradient(circle,rgba(0,47,217,.18),transparent 70%);top:-80px;right:calc(50% - 360px);animation:orbf 16s ease-in-out infinite reverse}\n@keyframes fu{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}\n@keyframes orbf{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.06)}}\n\n/* ─── HERO CONTENT ─── */\n.hero-inner{position:relative;z-index:10;text-align:center;max-width:700px;width:100%;padding:0 20px}\n.hero-badge{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(10,102,194,.4);background:rgba(10,102,194,.09);padding:6px 16px;border-radius:999px;font-size:12px;font-weight:600;letter-spacing:.06em;color:#60aeff;margin-bottom:28px;opacity:0;animation:fu .7s .2s forwards}\n.badge-dot{width:6px;height:6px;background:#1a8fff;border-radius:50%;animation:bpulse 1.8s infinite}\n@keyframes bpulse{0%,100%{box-shadow:0 0 0 0 rgba(26,143,255,.6)}60%{box-shadow:0 0 0 6px rgba(26,143,255,0)}}\n\n/* big headline */\nh1.hero-h1{font-size:clamp(46px,7vw,88px);font-weight:700;line-height:1.04;letter-spacing:-.045em;margin-bottom:22px;opacity:0;animation:fu .8s .34s forwards;text-wrap:balance}\n.grad-text{background:linear-gradient(135deg,#60aeff 0%,#1a8fff 40%,#0A66C2 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n\n.hero-sub{font-size:clamp(15px,1.6vw,19px);color:var(--muted);max-width:480px;margin:0 auto 36px;line-height:1.75;opacity:0;animation:fu .8s .52s forwards}\n.hero-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;opacity:0;animation:fu .8s .68s forwards;margin-bottom:20px}\n.btn-hero{display:inline-flex;align-items:center;gap:8px;padding:15px 32px;background:linear-gradient(135deg,var(--blue) 0%,var(--blue2) 100%);border:none;border-radius:10px;color:#fff;font-size:15.5px;font-weight:700;font-family:'Space Grotesk',sans-serif;text-decoration:none;box-shadow:0 0 44px rgba(10,102,194,.38);transition:box-shadow .3s,transform .2s;position:relative;overflow:hidden}\n.btn-hero::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.13) 0%,transparent 55%);opacity:0;transition:opacity .25s}\n.btn-hero:hover{box-shadow:0 0 72px rgba(10,102,194,.6);transform:translateY(-2px)}\n.btn-hero:hover::before{opacity:1}\n.btn-hero-arrow{font-size:17px;transition:transform .2s}\n.btn-hero:hover .btn-hero-arrow{transform:translateX(3px)}\n.btn-hero-out{display:inline-flex;align-items:center;gap:8px;padding:15px 32px;border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15.5px;font-weight:500;font-family:'Space Grotesk',sans-serif;text-decoration:none;transition:border-color .25s,background .25s;background:rgba(255,255,255,.03);backdrop-filter:blur(10px)}\n.btn-hero-out:hover{border-color:rgba(26,143,255,.4);background:rgba(10,102,194,.08)}\n\n.hero-social-proof{display:flex;align-items:center;justify-content:center;gap:14px;opacity:0;animation:fu .8s .84s forwards;margin-bottom:64px}\n.avatars{display:flex}\n.av{width:26px;height:26px;border-radius:50%;border:2px solid var(--bg);margin-left:-7px;background:linear-gradient(135deg,var(--blue),var(--blue2));display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}\n.av:first-child{margin-left:0}\n.proof-text{font-size:12.5px;color:var(--muted)}\n.proof-text strong{color:var(--text);font-weight:600}\n\n/* ─── HERO SPRITES (floating chips around title) ─── */\n.hero-sprites{position:absolute;inset:0;pointer-events:none;z-index:3}\n.sprite{position:absolute;display:flex;align-items:center;gap:7px;background:rgba(11,18,34,.88);border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:8px 12px;backdrop-filter:blur(16px);box-shadow:0 8px 32px rgba(0,0,0,.4);opacity:0;white-space:nowrap}\n/* positions — restreints aux extrêmes gauche/droite */\n.sp1{top:20%;left:3%}\n.sp2{top:18%;right:3%}\n.sp3{top:42%;left:1%}\n.sp4{top:40%;right:1%}\n.sp5{top:63%;left:3%}\n.sp6{top:61%;right:3%}\n/* animations */\n.sp1{animation:spIn .6s .9s cubic-bezier(.34,1.56,.64,1) forwards,spFloat1 7s 1.5s ease-in-out infinite}\n.sp2{animation:spIn .6s 1.1s cubic-bezier(.34,1.56,.64,1) forwards,spFloat2 8s 1.7s ease-in-out infinite}\n.sp3{animation:spIn .6s 1.3s cubic-bezier(.34,1.56,.64,1) forwards,spFloat1 9s 1.9s ease-in-out infinite reverse}\n.sp4{animation:spIn .6s 1.0s cubic-bezier(.34,1.56,.64,1) forwards,spFloat2 6s 1.6s ease-in-out infinite}\n.sp5{animation:spIn .6s 1.5s cubic-bezier(.34,1.56,.64,1) forwards,spFloat1 10s 2.1s ease-in-out infinite}\n.sp6{animation:spIn .6s 1.2s cubic-bezier(.34,1.56,.64,1) forwards,spFloat2 7.5s 1.8s ease-in-out infinite reverse}\n@keyframes spIn{from{opacity:0;transform:translateY(10px) scale(.92)}to{opacity:1;transform:translateY(0) scale(1)}}\n@keyframes spFloat1{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}\n@keyframes spFloat2{0%,100%{transform:translateY(0)}50%{transform:translateY(9px)}}\n.sprite{will-change:transform}\n.sp-icon{font-size:14px;flex-shrink:0}\n.sp-content{}\n.sp-val{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--text);line-height:1.2}\n.sp-sub{font-size:10px;color:var(--muted);line-height:1.2}\n.sp-dot-green{width:7px;height:7px;border-radius:50%;background:#22d87f;box-shadow:0 0 7px rgba(34,216,127,.6);flex-shrink:0;animation:bpulse 2s infinite}\n.sp-dot-blue{width:7px;height:7px;border-radius:50%;background:#1a8fff;box-shadow:0 0 7px rgba(26,143,255,.6);flex-shrink:0;animation:bpulse 2.4s infinite}\n.sp-bar-wrap{display:flex;align-items:flex-end;gap:2px;height:18px}\n.sp-bar{width:4px;border-radius:2px 2px 0 0;background:linear-gradient(to top,var(--blue),#60aeff)}\n\n/* ─── PRODUCT PREVIEW ─── */\n.hero-preview{position:relative;z-index:2;wi a démo en live<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer>\n  <a href=\"#\" class=\"foot-logo\">\n    <img src=\"47fd3e36-03e9-45f0-ab5b-2d409ee29d6d\" width=\"24\" height=\"24\" alt=\"InKognito\" style=\"object-fit:contain\">\n    <span class=\"foot-name\">In<span>K<\u002Fspan>ognito<\u002Fspan>\n  <\u002Fa>\n  <ul class=\"foot-links\">\n    <li><a href=\"#\">Fonctionnalités<\u002Fa><\u002Fli>\n    <li><a href=\"#\">Tarifs<\u002Fa><\u002Fli>\n    <li><a href=\"#\">Blog<\u002Fa><\u002Fli>\n    <li><a href=\"#\">Confidentialité<\u002Fa><\u002Fli>\n    <li><a href=\"#\">CGU<\u002Fa><\u002Fli>\n  <\u002Ful>\n  <div class=\"foot-legal\">© 2025 InKognito. Tous droits réservés.<\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n// ─── NAV SCROLL ───\nwindow.addEventListener('scroll', () => {\n  document.getElementById('main-nav').classList.toggle('scrolled', window.scrollY > 40);\n});\n\n// ─── REVEAL ON SCROLL ───\nconst revEls = document.querySelectorAll('.reveal');\nconst obs = new IntersectionObserver(entries => {\n  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('in'); });\n}, { threshold: 0.12 });\nrevEls.forEach(el => obs.observe(el));\n\n// ─── COUNTER ANIMATION ───\nfunction animateCounter(el, target, duration = 1600) {\n  let start = null;\n  const isFloat = String(target).includes('.');\n  const step = ts => {\n    if(!start) start = ts;\n    const progress = Math.min((ts - start) / duration, 1);\n    const ease = 1 - Math.pow(1 - progress, 3);\n    const val = isFloat ? (target * ease).toFixed(1) : Math.floor(target * ease);\n    el.textContent = val;\n    if(progress < 1) requestAnimationFrame(step);\n  };\n  requestAnimationFrame(step);\n}\nconst counterObs = new IntersectionObserver(entries => {\n  entries.forEach(e => {\n    if(e.isIntersecting) {\n      e.target.querySelectorAll('[data-count]').forEach(el => {\n        animateCounter(el, parseFloat(el.dataset.count));\n      });\n      counterObs.unobserve(e.target);\n    }\n  });\n}, { threshold: 0.3 });\ndocument.querySelectorAll('.stats-grid').forEach(el => counterObs.observe(el));\n\n// ─── AI TYPING ───\nconst typedEl = document.getElementById('ai-typed');\nif (typedEl) {\n  const phrases = [\n    \"J'ai commis 3 erreurs en lançant mon SaaS. Voici ce que j'aurais fait différemment ↓\",\n    \"Le secret des fondateurs qui closent facilement ? Ils ne vendent pas. Ils éduquent.\",\n    \"5 frameworks de copywriting qui ont multiplié mes leads par 4 en 60 jours.\",\n  ];\n  let phraseIdx = 0, charIdx = 0, isDeleting = false;\n  function typeLoop() {\n    const phrase = phrases[phraseIdx];\n    if(!isDeleting) {\n      typedEl.textContent = phrase.slice(0, charIdx + 1);\n      charIdx++;\n      if(charIdx === phrase.length) { isDeleting = true; setTimeout(typeLoop, 2400); return; }\n    } else {\n      typedEl.textContent = phrase.slice(0, charIdx - 1);\n      charIdx--;\n      if(charIdx === 0) { isDeleting = false; phraseIdx = (phraseIdx + 1) % phrases.length; setTimeout(typeLoop, 400); return; }\n    }\n    setTimeout(typeLoop, isDeleting ? 28 : 52);\n  }\n  setTimeout(typeLoop, 1800);\n}\n\n// ─── PREVIEW TABS ───\ndocument.querySelectorAll('.ptab').forEach((tab, i) => {\n  tab.addEventListener('click', () => {\n    document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));\n    tab.classList.add('active');\n  });\n});\n\n// ─── CHART BARS ANIMATE ON SCROLL ───\nconst chartObs = new IntersectionObserver(entries => {\n  entries.forEach(e => {\n    if(e.isIntersecting) {\n      e.target.querySelectorAll('.bar').forEach(b => b.style.animation = b.style.animation || 'barrise 1.2s ease-out forwards');\n    }\n  });\n}, { threshold: 0.4 });\ndocument.querySelectorAll('#chart-bars').forEach(el => chartObs.observe(el));\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
